services:
  postgres:
    image: postgres:16
    container_name: toolgate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: toolgate
      POSTGRES_PASSWORD: toolgate_dev_password
      POSTGRES_DB: toolgate
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
